<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #1c1c1c; margin: 0; padding: 0; background-color: #f6f6f6; }
  .wrap { max-width: 720px; margin: 0 auto; background: #ffffff; padding: 24px 28px; }
  h1 { font-size: 20px; margin: 0 0 6px 0; }
  h2 { font-size: 16px; margin: 24px 0 8px 0; padding-bottom: 4px; border-bottom: 1px solid #ddd; }
  h3 { font-size: 14px; margin: 16px 0 6px 0; color: #444; }
  .meta { color: #666; font-size: 12px; margin-bottom: 16px; }
  .summary-box { background: #f0f4f8; padding: 12px 16px; border-radius: 4px; margin: 12px 0 20px 0; }
  .summary-box ul { margin: 4px 0 0 0; padding-left: 18px; }
  table { width: 100%; border-collapse: collapse; margin: 6px 0 14px 0; font-size: 13px; }
  th { background: #f6f6f6; text-align: left; padding: 6px 8px; border-bottom: 1px solid #ccc; font-weight: 600; }
  td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: top; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .sku { font-family: 'SFMono-Regular', Consolas, Menlo, monospace; font-size: 12px; }
  .tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; vertical-align: middle; margin-left: 6px; border: 1px solid transparent; }
  .tag-critical { background: #b71c1c; color: #fff; border-color: #6b0000; }
  .tag-urgent { background: #f4511e; color: #fff; border-color: #a02d00; }
  .tag-addon { background: #fb8c00; color: #fff; border-color: #a55c00; }
  .tag-lowstock { background: #5e7ce2; color: #fff; border-color: #2d4ba8; }
  .vendor-block { border-left: 3px solid #1a73e8; padding: 8px 12px; margin: 12px 0; background: #fafbfc; }
  .vendor-block .vendor-name { font-weight: 600; font-size: 15px; }
  .vendor-block .summary { color: #666; font-size: 12px; margin-top: 2px; }
  .btn { display: inline-block; padding: 10px 18px; background: #1a73e8; color: #fff !important; text-decoration: none; border-radius: 4px; font-weight: 600; font-size: 13px; margin: 12px 0 4px 0; }
  .btn:hover { background: #1558b8; }
  .footer { margin-top: 28px; padding-top: 14px; border-top: 1px solid #ddd; color: #888; font-size: 11px; }
  .neg { color: #b71c1c; font-weight: 600; }

  @media print {
    body { background: #fff; }
    .wrap { max-width: none; padding: 0; }
    .btn, .btn-explainer { display: none !important; }
    .meta { font-size: 10px; }
    h1 { font-size: 16px; }
    h2 { font-size: 13px; page-break-before: auto; margin-top: 18px; }
    h3 { font-size: 12px; }
    table { font-size: 10px; page-break-inside: auto; }
    tr { page-break-inside: avoid; page-break-after: auto; }
    thead { display: table-header-group; }
    th, td { padding: 3px 5px; }
    .vendor-block { page-break-inside: avoid; background: #fff; border-left-width: 2px; margin: 8px 0 4px 0; padding: 4px 8px; }
    .footer { display: none; }
    .tag { color: #000 !important; background: #fff !important; border: 1px solid #000 !important; padding: 0 4px; font-size: 9px; }
    @page { margin: 0.5in 0.4in; }
  }
</style>
